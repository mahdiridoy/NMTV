name: Update M3U Playlist

on:
  schedule:
    - cron: "0 * * * *"   # every 6 hours
  workflow_dispatch: {}      # allows manual trigger from Actions tab
  push:
    paths:
      - "sources.txt"        # also run whenever you edit your link list

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade yt-dlp

      - name: Run converter
        run: python extract_stream.py

      - name: Commit updated playlist
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --staged --quiet || git commit -m "Auto-update playlist.m3u [skip ci]"
          git push
          
